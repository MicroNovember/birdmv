<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>หรรมน้อย ออนไลน์ (M3U Player)</title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player/dist/shaka-player.compiled.js"></script>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #fff;
}

.container {
    height: 100vh;
    position: relative;
}

/* layout */
.playlist {
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* header */
.playlist-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index: 100;
}

.playlist-header img {
    width: 120px;
}

/* tabs */
.tabs {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 12px;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 20px rgba(0,0,0,.25);
}

.tab {
    padding: 8px 16px;
    border: none;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: #aaa;
    cursor: pointer;
    transition: .25s;
}

.tab:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
}

.tab.active {
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: #fff;
}

/* scroll area */
.channels-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* grid */
#playlist {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
}

/* channel */
.channel {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    transition: .25s;
    box-sizing: border-box;
}

.channel:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.12);
}

.channel.active {
    background: linear-gradient(135deg,#00c6ff,#0072ff);
}

.channel img {
    width: 80px;
    height: 80px;
    object-fit: contain;
    margin-bottom: 8px;
}

.channel span {
    font-size: 14px;
    text-align: center;
    word-break: break-word;
}

/* player popup */
.video-float {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 95vw;
    height: 95vh;
    max-width: 1600px;
    max-height: 95vh;

    border-radius: 16px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 45px rgba(0,0,0,.85);
    z-index: 9999;
}

.float-header {
    height: 42px;
    padding: 0 14px;
    background: rgba(20,20,20,.95);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

#closePlayer {
    border: none;
    background: rgba(255,255,255,.08);
    color: #fff;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
}

#closePlayer:hover {
    background: #ff3b30;
}

/* responsive */
@media (max-width:1200px){
    #playlist { grid-template-columns: repeat(5,1fr); }
}
@media (max-width:900px){
    #playlist { grid-template-columns: repeat(4,1fr); }
}
@media (max-width:600px){
    #playlist { grid-template-columns: repeat(2,1fr); }
}

.top-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#111;
    padding:10px;
    width:100%;
    box-sizing:border-box;
}

.left-box,
.right-box{
    flex:1;
}

.tabs{
    flex:2;
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
}

.home-btn{
    background:#ef4444;
    color:#fff;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

    <div class="video-float" id="videoFloat">
        <div class="float-header">
            <span id="playerTitle">หรรมน้อย ออนไลน์  รอโหลด...สักครู่</span>
            <button id="closePlayer">✕</button>
        </div>
        
        <video
            id="videoPlayer"
            controls
            autoplay
            muted
            playsinline
            webkit-playsinline
            style="width:100%;height:calc(100% - 42px);background:#000;display:none;">
        </video>

        <iframe
            id="iframePlayer"
            allowfullscreen
            allow="autoplay"
            style="width:100%;height:calc(100% - 42px);border:none;display:none;">
         frameBorder="0"></iframe>
    </div>

    <div class="playlist">
        <div class="playlist-header">
            <span>หรรมน้อย ออนไลน์ (M3U Player)</span>
        </div>

        <div class="top-bar">
            <div class="left-box">
                <button onclick="goHome()" class="home-btn">⬅ กลับหน้าหลัก</button>
            </div>
            <div class="tabs" id="tabs">
                <button class="tab active" data-cat="ทั้งหมด">ทั้งหมด</button>
            </div>
            <div class="right-box"></div>
        </div>

        <div class="channels-wrap">
            <div id="playlist"></div>
        </div>
    </div>

</div>

<script>
// ข้อมูลสถานีที่ถูกดึงมาจาก m3u
let data = {
    stations: []
};

// --- การตั้งค่าหลัก (ปรับเปลี่ยนที่นี่ได้ครับ) ---
// วาง URL ของไฟล์ M3U ของคุณแทนที่ลิงก์ด้านล่างนี้ได้เลย
const PLAYLIST_URL = "https://raw.githubusercontent.com/ตัวอย่าง/main/iptv.m3u"; 

// เปิดใช้งาน CORS Proxy หากนำไปรันแล้วเล่นไม่ได้หรือโหลดรายการไม่มา (true = เปิด / false = ปิด)
const USE_CORS_PROXY = true;
const CORS_PROXY_URL = "https://cors-anywhere.herokuapp.com/";

// คลึง Element หลักจาก DOM
const videoPlayer = document.getElementById("videoPlayer");
const iframePlayer = document.getElementById("iframePlayer");
const playlistEl = document.getElementById("playlist");
const float = document.getElementById("videoFloat");
const tabsEl = document.getElementById("tabs");
const playerTitle = document.getElementById("playerTitle");

let shakaPlayer = null;

// ================= ฟังก์ชันเล่นวิดีโอ (SHAKA PLAYER) =================
async function playVideo(ch) {
    videoPlayer.style.display = "block";
    iframePlayer.style.display = "none";
    playerTitle.innerText = "กำลังเชื่อมต่อสตรีม: " + ch.name;

    // ทำลายอินสแตนซ์ผู้เล่นเก่าทิ้ง ป้องกันระบบทับซ้อนค้าง
    if (shakaPlayer) {
        await shakaPlayer.destroy();
        shakaPlayer = null;
    }

    shakaPlayer = new shaka.Player(videoPlayer);

    // ดักจับ Error แจ้งเตือนใน Console
    shakaPlayer.addEventListener('error', e => {
        console.error('Shaka Player Error:', e.detail);
    });

    // ตรวจสอบและตั้งค่าลิขสิทธิ์ ClearKey DRM
    if (ch.key) {
        shakaPlayer.configure({
            drm: {
                clearKeys: ch.key
            }
        });
    }

    try {
        // ทำการโหลดและสั่งให้วิดีโอทำงาน
        await shakaPlayer.load(ch.url);
        videoPlayer.muted = false; // เปิดเสียงหลังจากสตรีมพร้อมเล่นสำเร็จ
        await videoPlayer.play();
        playerTitle.innerText = "กำลังรับชม: " + ch.name;
        console.log("กำลังเล่น:", ch.name, "DRM:", ch.key ? "Yes" : "No");
    } catch(err) {
        playerTitle.innerText = "❌ ช่องนี้เล่นไม่ได้ชั่วคราว";
        console.error("สตรีมเกิดข้อผิดพลาดในการโหลด:", err);
    }
}

// ================= ฟังก์ชันอ่านและถอดรหัสเนื้อหาไฟล์ M3U =================
function parseM3U(rawText) {
    const lines = rawText.split('\n');
    const stations = [];
    
    let currentStation = null;
    let tempKeys = null;

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        if (!line) continue;

        // ดักจับคู่ค่า ClearKey จากคำสั่ง #KODIPROP
        if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key=')) {
            const keyString = line.split('=')[1];
            if (keyString && keyString.includes(':')) {
                const parts = keyString.split(':');
                if (parts.length === 2) {
                    if (!tempKeys) tempKeys = {};
                    // บันทึกค่าลง Object { "kid": "key" } ตามมาตรฐาน ClearKey ของ Shaka
                    tempKeys[parts[0].trim()] = parts[1].trim();
                }
            }
        }

        // อ่านบรรทัดระบุข้อมูลช่องสัญญาณสตรีม
        if (line.startsWith('#EXTINF:')) {
            currentStation = {};
            
            // ใช้ Regex ในการตัดแกะดึงค่า tvg-logo, group-title และชื่อช่อง
            const logoMatch = line.match(/tvg-logo="([^"]+)"/);
            const groupMatch = line.match(/group-title="([^"]+)"/);
            
            // หาชื่อช่องหลังเครื่องหมาย Comma (,) ตัวสุดท้ายของบรรทัด
            const commaIndex = line.lastIndexOf(',');
            let chName = "ไม่ระบุชื่อช่อง";
            if (commaIndex !== -1) {
                chName = line.substring(commaIndex + 1).trim();
            }

            currentStation.name = chName;
            currentStation.image = logoMatch ? logoMatch[1] : 'https://placehold.co/100x100/1e293b/ffffff?text=IPTV';
            currentStation.category = groupMatch ? groupMatch[1] : 'ทั่วไป';
            
            if (tempKeys) {
                currentStation.key = tempKeys;
            }
        } 
        // อ่านบรรทัดลิงก์ URL สตรีมมิงวิดีโอ (บรรทัดที่ไม่ขึ้นต้นด้วยเครื่องหมาย #)
        else if (!line.startsWith('#') && currentStation) {
            currentStation.url = line;
            stations.push(currentStation);
            
            // รีเซ็ตตัวแปรเพื่อเตรียมรับข้อมูลช่องถัดไป
            currentStation = null;
            tempKeys = null;
        }
    }
    return stations;
}

// ================= ฟังก์ชันดาวน์โหลดและประมวลผลเพลย์ลิสต์ M3U =================
async function loadPlaylist() {
    try {
        let finalUrl = PLAYLIST_URL + "?t=" + Date.now();
        
        // แนบสลับเส้นทางผ่าน CORS Proxy เพื่อช่วยทะลวงบล็อก
        if (USE_CORS_PROXY) {
            finalUrl = CORS_PROXY_URL + finalUrl;
        }

        const res = await fetch(finalUrl);
        if (!res.ok) throw new Error(`HTTP Error Status: ${res.status}`);
        
        const rawText = await res.text();
        const parsedStations = parseM3U(rawText);

        data.stations = parsedStations;

        renderTabs();
        renderChannels();
        console.log("ถอดข้อมูลเรียบร้อย พบจำนวนสถานีทั้งสิ้น:", data.stations.length, "ช่อง");
    } catch (err) {
        console.error("โหลดไฟล์เพลย์ลิสต์ M3U ไม่สำเร็จ:", err);
        playlistEl.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #ef4444; padding: 40px;">❌ โหลดเพลย์ลิสต์ไม่สำเร็จ กรุณาเช็คตัวแปรลิงก์หรือสลับตัวเชื่อม Proxy</div>`;
    }
}

// ================= ฟังก์ชันจัดการและแสดงหมวดหมู่แท็บ (TABS) =================
function renderTabs() {
    const categories = [
        "ทั้งหมด",
        ...new Set(data.stations.map(ch => ch.category))
    ];

    tabsEl.innerHTML = "";

    categories.forEach((cat, i) => {
        const tab = document.createElement("button");
        tab.className = "tab" + (i === 0 ? " active" : "");
        tab.dataset.cat = cat;
        tab.innerText = cat;

        tab.onclick = () => {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            renderChannels(cat);
        };

        tabsEl.appendChild(tab);
    });
}

// ================= ฟังก์ชันแสดงรายชื่อและสลับการคลิกช่อง (CHANNELS) =================
function renderChannels(category = "ทั้งหมด") {
    playlistEl.innerHTML = "";

    const filtered = category === "ทั้งหมด" 
        ? data.stations 
        : data.stations.filter(ch => ch.category === category);

    if(filtered.length === 0) {
        playlistEl.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #aaa; padding: 20px;">ไม่มีข้อมูลช่องในหมวดหมู่นี้</div>`;
        return;
    }

    filtered.forEach((ch, i) => {
        const div = document.createElement("div");
        div.className = "channel";
        div.innerHTML = `
            <img src="${ch.image}" onerror="this.onerror=null; this.src='https://placehold.co/100x100/1e293b/ffffff?text=IPTV';">
            <span>${ch.name}</span>
        `;

        div.onclick = () => {
            float.style.display = "block";

            // แยกแยะว่าลิงก์เป็นเว็บสคริปต์ฝังตัว (Iframe) หรือสตรีมตรง
            const isIframe = ch.url.includes(".php") || ch.url.includes("embed") || ch.url.includes("youtube");

            videoPlayer.style.display = "none";
            iframePlayer.style.display = "none";

            if (isIframe) {
                iframePlayer.style.display = "block";
                iframePlayer.src = ch.url;
                playerTitle.innerText = "กำลังรับชมภาพจำลอง: " + ch.name;
            } else {
                playVideo(ch);
            }

            document.querySelectorAll(".channel").forEach(c => c.classList.remove("active"));
            div.classList.add("active");
        };

        playlistEl.appendChild(div);
    });
}

// ================= ฟังก์ชันสำหรับปิดเครื่องเล่น (CLOSE) =================
document.getElementById("closePlayer").onclick = async () => {
    float.style.display = "none";
    videoPlayer.pause();
    videoPlayer.removeAttribute("src");
    videoPlayer.load();
    iframePlayer.src = "";

    if (shakaPlayer) {
        await shakaPlayer.destroy();
        shakaPlayer = null;
    }
    playerTitle.innerText = "หรรมน้อย ออนไลน์  รอโหลด...สักครู่";
};

// ================= ปุ่มสั่งการถอยกลับหน้าหลัก (HOME) =================
function goHome(){
    window.location.href = "https://Hssmnoy.github.io/test/index.html";
}

// เริ่มต้นอ่านระบบครั้งแรกเมื่อเปิดตัวเพจ
loadPlaylist();
</script>

</body>
</html>
