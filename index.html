<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SAMORN IPTV Ultimate 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.11.6/dist/shaka-player.compiled.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', system-ui, sans-serif;
            background: #0B0E14;
            color: #F0F3F8;
            padding: 16px;
            min-height: 100vh;
        }

        /* main container */
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(18, 22, 30, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 40px;
            padding: 20px 24px;
            border: 0.5px solid rgba(255,255,255,0.06);
        }

        /* header: logo, playlist selector, manage btn, search */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-area i {
            font-size: 32px;
            background: linear-gradient(135deg, #0A84FF, #5E5CE0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-area h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FFF, #A0AEC0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* dropdown selector ดูดี สีเข้ม */
        .playlist-selector {
            background: #1C212A;
            border-radius: 44px;
            padding: 4px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 200px;
        }
        .playlist-selector i {
            color: #0A84FF;
        }
        .playlist-selector select {
            background: #1C212A;
            border: none;
            color: white;
            font-weight: 500;
            font-size: 14px;
            padding: 10px 0;
            outline: none;
            flex: 1;
            border-radius: 40px;
        }
        .playlist-selector select option {
            background: #1C212A;
            color: white;
        }
        .playlist-manager-btn {
            background: #0A84FF;
            border: none;
            border-radius: 44px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            transition: 0.2s;
        }
        .playlist-manager-btn:hover {
            background: #0066CC;
        }
        .search-box {
            background: #14181F;
            border-radius: 44px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 180px;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 14px;
        }
        .search-box input::placeholder {
            color: #8E95A5;
        }

        /* main 2 columns */
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }
        .video-col {
            flex: 1.2;
            min-width: 260px;
        }
        .channels-col {
            flex: 2.4;
            min-width: 260px;
        }

        /* video player 16:9 */
        .video-wrapper {
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            box-shadow: 0 12px 28px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* info bar + track buttons */
        .info-bar {
            background: #14181F;
            border-radius: 28px;
            margin-top: 18px;
            padding: 14px 18px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .now-playing {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }
        .track-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .track-btn {
            background: #1C212A;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: #ddd;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .track-btn:hover {
            background: #0A84FF;
            color: white;
        }

        /* group filter bar */
        .group-filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .group-selector {
            background: #14181F;
            border-radius: 44px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .group-selector select {
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            padding: 6px 0;
        }
        .group-selector select option {
            background: #1C212A;
            color: white;
        }

        /* channels grid */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 18px;
            max-height: 58vh;
            overflow-y: auto;
            padding: 4px 2px;
        }
        .channel-card {
            background: #14181F;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s ease;
            border: 0.5px solid rgba(255,255,255,0.05);
        }
        .channel-card:hover {
            transform: translateY(-5px);
            background: #1E2530;
            border-color: rgba(10,132,255,0.4);
        }
        .card-img {
            aspect-ratio: 16/9;
            background: #0A0C10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .channel-logo {
            max-width: 70%;
            max-height: 70%;
            object-fit: contain;
        }
        .card-info {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 8px;
			padding: 10px 12px;
		}
		.card-info span {
			flex: 1;
			word-break: break-word;
			font-size: 13px;
			font-weight: 500;
			line-height: 1.3;
		}
		.card-actions {
			display: flex;
			gap: 8px;
			flex-shrink: 0;
		}
		.card-actions i {
			font-size: 14px;
			cursor: pointer;
		}
        .card-actions i:hover {
            color: #0A84FF;
        }
		
		@media (max-width: 480px) {
		.channels-grid {
			grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
		}
		.card-info {
			padding: 8px;
			gap: 6px;
		}
		.card-actions i {
			font-size: 12px;
		}
	}

        /* Modal หน้าต่าง Popup */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #14181F;
            border-radius: 48px;
            width: 90%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .modal-content h2, .modal-content h3 {
            margin-bottom: 20px;
            font-weight: 600;
        }
        .playlist-list {
            margin: 20px 0;
            max-height: 280px;
            overflow-y: auto;
        }
        .playlist-item {
            background: #1C212A;
            border-radius: 28px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .playlist-info {
            flex: 1;
        }
        .playlist-name {
            font-weight: 600;
        }
        .playlist-url {
            font-size: 10px;
            color: #8E95A5;
            word-break: break-all;
        }
        .playlist-actions button {
            background: transparent;
            border: none;
            margin-left: 12px;
            color: #8E95A5;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .playlist-actions button:hover {
            color: #0A84FF;
        }
        .form-group {
            margin: 18px 0;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            background: #1C212A;
            border: 0.5px solid #2C313A;
            border-radius: 32px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .btn-primary {
            background: #0A84FF;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline-modal {
            background: transparent;
            border: 0.5px solid #3A3F4A;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .flex-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .small-text {
            font-size: 12px;
            color: #8E95A5;
        }
        @media (max-width: 768px) {
            .app-container { padding: 16px; }
            .channels-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        }
		::-webkit-scrollbar {
			width: 5px;
			height: 5px;
		}
		::-webkit-scrollbar-track {
			background: transparent;
		}
		::-webkit-scrollbar-thumb {
			background: rgba(74, 85, 104, 0.6);
			border-radius: 20px;
		}
		::-webkit-scrollbar-thumb:hover {
			background: rgba(10, 132, 255, 0.8);
		}
		.channels-grid, .playlist-list, .modal-content {
			-webkit-overflow-scrolling: touch;
			scroll-behavior: smooth;
		}
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <i class="fas fa-play-circle"></i>
            <h1>SAMORN 2026</h1>
        </div>
        <div class="playlist-selector">
            <i class="fas fa-list-ul"></i>
            <select id="playlistDropdown"></select>
        </div>
        <button class="playlist-manager-btn" id="openPlaylistManagerBtn"><i class="fas fa-cog"></i> จัดการ Playlists</button>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อช่อง หรือกลุ่ม...">
        </div>
    </div>

    <div class="main-layout">
        <div class="video-col">
            <div class="video-wrapper">
                <video id="videoPlayer" controls autoplay muted playsinline></video>
            </div>
            <div class="info-bar">
                <div class="now-playing">
                    <i class="fas fa-tv" style="color:#0A84FF"></i>
                    <span id="currentChannelName">—</span>
                    <span id="drmBadge" style="background:#1C212A; padding:2px 10px; border-radius:30px; font-size:11px;">⚪</span>
                </div>
                <div class="track-buttons">
                    <button id="qualityBtn" class="track-btn"><i class="fas fa-gear"></i> คุณภาพ</button>
                    <button id="audioBtn" class="track-btn"><i class="fas fa-headphones"></i> เสียง</button>
                    <button id="subtitleBtn" class="track-btn"><i class="fas fa-closed-captioning"></i> ซับ</button>
                </div>
            </div>
        </div>
        <div class="channels-col">
            <!-- Group Filter -->
            <div class="group-filter-bar">
                <div class="group-selector">
                    <i class="fas fa-layer-group"></i>
                    <select id="groupSelect"></select>
                </div>
                <div style="font-size:13px; background:#14181F; padding:6px 14px; border-radius:30px;" id="channelCount">0 ช่อง</div>
            </div>
            <div id="channelsGrid" class="channels-grid"></div>
        </div>
    </div>
</div>

<div id="globalModal" class="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
    // ---------- Data ----------
    let playlists = [];          // { id, name, urlSource, channels:[] }
    let currentPlaylistId = null;
    let searchKeyword = "";
    let currentGroupFilter = "ทั้งหมด";
    let shakaPlayer = null;
    const videoEl = document.getElementById('videoPlayer');

    // ---------- LocalStorage ----------
    function saveData() {
        localStorage.setItem('iptv_ultimate_full', JSON.stringify(playlists));
        localStorage.setItem('iptv_current_id', currentPlaylistId);
    }
    function loadData() {
        const stored = localStorage.getItem('iptv_ultimate_full');
        if(stored) playlists = JSON.parse(stored);
        if(!playlists.length) {
            playlists.push({ id: Date.now(), name: "My Playlist", urlSource: null, channels: [] });
        }
        const savedId = localStorage.getItem('iptv_current_id');
        if(savedId && playlists.find(p => p.id == savedId)) currentPlaylistId = parseInt(savedId);
        else currentPlaylistId = playlists[0].id;
    }
    function currentPlaylist() {
        return playlists.find(p => p.id === currentPlaylistId);
    }

    // Filter channels by search + group
    function getFilteredChannels() {
        const pl = currentPlaylist();
        if(!pl) return [];
        let filtered = [...pl.channels];
        if(searchKeyword.trim()) {
            const kw = searchKeyword.toLowerCase();
            filtered = filtered.filter(ch => ch.name.toLowerCase().includes(kw) || (ch.group || "").toLowerCase().includes(kw));
        }
        if(currentGroupFilter !== "ทั้งหมด") {
            filtered = filtered.filter(ch => (ch.group || "Uncategorized") === currentGroupFilter);
        }
        return filtered;
    }

    // update group dropdown based on current playlist channels
    function updateGroupSelect() {
        const pl = currentPlaylist();
        if(!pl) return;
        const groupsSet = new Set(["ทั้งหมด"]);
        pl.channels.forEach(ch => {
            let g = ch.group || "Uncategorized";
            groupsSet.add(g);
        });
        const select = document.getElementById('groupSelect');
        if(!select) return;
        select.innerHTML = '';
        Array.from(groupsSet).forEach(g => {
            const opt = document.createElement('option');
            opt.value = g;
            opt.textContent = g === "ทั้งหมด" ? "📂 ทั้งหมด" : g;
            if(currentGroupFilter === g) opt.selected = true;
            select.appendChild(opt);
        });
    }

    // Render channel grid
    function renderChannels() {
        const container = document.getElementById('channelsGrid');
        const filtered = getFilteredChannels();
        document.getElementById('channelCount').innerText = filtered.length + " ช่อง";
        if(filtered.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:40px;">ไม่มีช่อง <button class="track-btn" id="addFirstChannelBtn">+ เพิ่มช่อง</button></div>`;
            const addBtn = document.getElementById('addFirstChannelBtn');
            if(addBtn) addBtn.onclick = () => openAddChannelModal();
            return;
        }
        let html = '';
        filtered.forEach((ch, idx) => {
            const logoHtml = ch.logo ? `<img class="channel-logo" src="${ch.logo}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%236C737F%22%3E%3Cpath d=%22M4 4h16v16H4z%22/%3E%3C/svg%3E'">` : `<i class="fas fa-tower-broadcast" style="font-size:32px; color:#0A84FF;"></i>`;
            html += `<div class="channel-card" data-idx="${idx}">
                        <div class="card-img">${logoHtml}</div>
                        <div class="card-info">
                            <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(ch.name)}</span>
                            <div class="card-actions">
                                <i class="fas fa-edit edit-channel" data-idx="${idx}"></i>
                                <i class="fas fa-trash-alt del-channel" data-idx="${idx}"></i>
                            </div>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
        // bind play
        document.querySelectorAll('.channel-card').forEach(card => {
            const idx = parseInt(card.dataset.idx);
            card.addEventListener('click', (e) => {
                if(e.target.classList.contains('edit-channel') || e.target.classList.contains('del-channel')) return;
                playChannel(filtered[idx]);
            });
        });
        document.querySelectorAll('.edit-channel').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); openEditChannelModal(parseInt(btn.dataset.idx)); });
        });
        document.querySelectorAll('.del-channel').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation();
                if(confirm('ลบช่องนี้?')) {
                    currentPlaylist().channels.splice(parseInt(btn.dataset.idx), 1);
                    saveData();
                    updateGroupSelect();
                    renderChannels();
                    renderPlaylistDropdown();
                }
            });
        });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    // ---------- Shaka + Clearkey + HLS ----------
    function initShaka() {
        if(!shakaPlayer) {
            shakaPlayer = new shaka.Player(videoEl);
            shakaPlayer.addEventListener('error', e => console.warn(e.detail));
            shaka.polyfill.installAll();
            shakaPlayer.configure({ manifest: { hls: { default: true } } });
        }
    }
    async function playChannel(channel) {
        if(!channel?.url) return;
        initShaka();
        document.getElementById('currentChannelName').innerText = channel.name;
        const drmSpan = document.getElementById('drmBadge');
        drmSpan.innerText = '⏳';
        try {
            let drmConfig = {};
            if(channel.licenseKey && channel.keyId) {
                let clearKeys = {}; clearKeys[channel.keyId] = channel.licenseKey;
                drmConfig = { clearKeys }; drmSpan.innerText = '🔐 Clearkey';
            } else if(channel.licenseKeyRaw?.includes(':')) {
                let parts = channel.licenseKeyRaw.split(':');
                let clearKeys = {}; clearKeys[parts[0]] = parts[1];
                drmConfig = { clearKeys }; drmSpan.innerText = '🔐 Clearkey';
            } else drmSpan.innerText = '🔓 No DRM';
            if(Object.keys(drmConfig).length) await shakaPlayer.configure({ drm: drmConfig });
            await shakaPlayer.load(channel.url);
        } catch(err) { drmSpan.innerText = '❌ Error'; console.error(err); }
    }

    // Track selection UI (quality/audio/sub)
    function showTrackSelector(type) {
        if(!shakaPlayer) return;
        let options = [];
        if(type === 'quality') {
            const vars = shakaPlayer.getVariantTracks();
            const heights = [...new Set(vars.map(v=>v.height).filter(h=>h))].sort((a,b)=>b-a);
            options = heights.length ? heights : ['Auto'];
        } else if(type === 'audio') {
            options = shakaPlayer.getAudioLanguagesAndRoles().map(l=>l.language);
        } else {
            options = shakaPlayer.getTextTracks().map(t=>t.language||t.label);
            options.unshift('ปิด');
        }
        let html = `<h3>เลือก ${type==='quality'?'คุณภาพ':(type==='audio'?'เสียง':'ซับไตเติ้ล')}</h3><div style="display:flex;flex-direction:column;gap:12px;">`;
        options.forEach(opt => { html += `<button class="btn-outline-modal track-opt" data-val="${opt}">${opt}</button>`; });
        html += `<div class="flex-buttons"><button class="btn-outline-modal" onclick="closeModal()">ปิด</button></div>`;
        openModalRaw(html);
        setTimeout(() => {
            document.querySelectorAll('.track-opt').forEach(btn => {
                btn.onclick = () => {
                    const val = btn.dataset.val;
                    if(type === 'quality') {
                        if(val === 'Auto') shakaPlayer.configure({ preferredAudioLanguage: null });
                        else { const track = shakaPlayer.getVariantTracks().find(t=>t.height==val); if(track) shakaPlayer.selectVariantTrack(track); }
                    } else if(type === 'audio') shakaPlayer.selectAudioLanguage(val);
                    else if(type === 'subtitle') {
                        if(val === 'ปิด') shakaPlayer.setTextTrackVisibility(false);
                        else { const track = shakaPlayer.getTextTracks().find(t=>t.language===val||t.label===val); if(track) shakaPlayer.selectTextTrack(track); shakaPlayer.setTextTrackVisibility(true); }
                    }
                    closeModal();
                };
            });
        }, 20);
    }

    // ---------- Playlist Dropdown ----------
    function renderPlaylistDropdown() {
        const select = document.getElementById('playlistDropdown');
        select.innerHTML = '';
        playlists.forEach(pl => {
            const opt = document.createElement('option');
            opt.value = pl.id;
            opt.textContent = `${pl.name} (${pl.channels.length})`;
            if(pl.id === currentPlaylistId) opt.selected = true;
            select.appendChild(opt);
        });
    }

    // ---------- Playlist Manager Modal (full management) ----------
    function openPlaylistManager() {
        let html = `<h2><i class="fas fa-list-ul"></i> จัดการ Playlists</h2>
        <div id="playlistListContainer" style="margin-bottom:20px;"></div>
        <div class="form-group"><input type="text" id="newPlName" placeholder="ชื่อ Playlist ใหม่"><input type="text" id="newPlUrl" placeholder="URL M3U (online) - ใส่หรือปล่อยว่าง" style="margin-top:10px;"></div>
        <button id="createPlaylistBtn" class="btn-primary"><i class="fas fa-plus"></i> สร้าง Playlist ใหม่</button>
        <div class="flex-buttons"><button id="importFileBtn" class="btn-outline-modal"><i class="fas fa-folder-open"></i> นำเข้า .m3u จากเครื่อง</button><button id="exportCurrentPlaylistBtn" class="btn-outline-modal"><i class="fas fa-download"></i> ส่งออก Playlist</button></div>
        <div class="flex-buttons"><button id="closeManagerBtn" class="btn-outline-modal">ปิด</button></div>`;
        openModalRaw(html);
        refreshPlaylistListUI();
        document.getElementById('createPlaylistBtn').onclick = async () => {
            const name = document.getElementById('newPlName').value.trim();
            const url = document.getElementById('newPlUrl').value.trim();
            if(!name) return alert('กรุณากรอกชื่อ Playlist');
            let channels = [];
            if(url) {
                try {
                    const resp = await fetch(url);
                    if(!resp.ok) throw new Error();
                    const txt = await resp.text();
                    channels = parseM3UToChannels(txt).channels;
                } catch(e) { alert('โหลด URL ไม่สำเร็จ'); return; }
            }
            playlists.push({ id: Date.now(), name, urlSource: url || null, channels });
            currentPlaylistId = playlists[playlists.length-1].id;
            saveData();
            renderPlaylistDropdown();
            updateGroupSelect();
            renderChannels();
            refreshPlaylistListUI();
            document.getElementById('newPlName').value = '';
            document.getElementById('newPlUrl').value = '';
        };
        document.getElementById('importFileBtn').onclick = () => {
            const input = document.createElement('input'); input.type='file'; input.accept='.m3u,.txt';
            input.onchange = e => {
                if(!e.target.files.length) return;
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = ev => {
                    const parsed = parseM3UToChannels(ev.target.result);
                    const plName = prompt('ชื่อ Playlist', file.name.replace(/\.m3u.*/i,''));
                    if(plName) {
                        playlists.push({ id: Date.now(), name: plName, urlSource: null, channels: parsed.channels });
                        currentPlaylistId = playlists[playlists.length-1].id;
                        saveData();
                        renderPlaylistDropdown();
                        updateGroupSelect();
                        renderChannels();
                        refreshPlaylistListUI();
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        };
        document.getElementById('exportCurrentPlaylistBtn').onclick = () => {
            const pl = currentPlaylist();
            let m3u = '#EXTM3U\n';
            pl.channels.forEach(ch => {
                let extinf = `#EXTINF:-1`;
                if(ch.group) extinf += ` group-title="${ch.group}"`;
                if(ch.logo) extinf += ` tvg-logo="${ch.logo}"`;
                extinf += `,${ch.name}\n`;
                if(ch.licenseKeyRaw) m3u += `#KODIPROP:inputstream.adaptive.license_key=${ch.licenseKeyRaw}\n`;
                m3u += extinf + ch.url + '\n';
            });
            const blob = new Blob([m3u], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${pl.name}.m3u`;
            a.click();
            URL.revokeObjectURL(blob);
        };
        document.getElementById('closeManagerBtn').onclick = closeModal;
    }
    function refreshPlaylistListUI() {
        const container = document.getElementById('playlistListContainer');
        if(!container) return;
        container.innerHTML = '';
        playlists.forEach(pl => {
            const div = document.createElement('div');
            div.className = 'playlist-item';
            div.innerHTML = `<div class="playlist-info"><div class="playlist-name">${escapeHtml(pl.name)} (${pl.channels.length} ช่อง)</div>${pl.urlSource ? `<div class="playlist-url">📡 ${pl.urlSource.substring(0,60)}</div>` : '<div class="playlist-url">📁 Local</div>'}</div>
                            <div class="playlist-actions">
                                <button class="select-pl" data-id="${pl.id}" title="เลือกใช้งาน"><i class="fas fa-check-circle"></i></button>
                                <button class="edit-pl" data-id="${pl.id}" title="แก้ไขชื่อ/URL"><i class="fas fa-pen"></i></button>
                                <button class="delete-pl" data-id="${pl.id}" title="ลบ"><i class="fas fa-trash"></i></button>
                            </div>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.select-pl').forEach(btn => {
            btn.onclick = () => { const id = parseInt(btn.dataset.id); if(currentPlaylistId !== id) { currentPlaylistId = id; currentGroupFilter="ทั้งหมด"; saveData(); renderPlaylistDropdown(); updateGroupSelect(); renderChannels(); closeModal(); } };
        });
        document.querySelectorAll('.edit-pl').forEach(btn => {
            btn.onclick = () => {
                const id = parseInt(btn.dataset.id);
                const pl = playlists.find(p=>p.id===id);
                if(pl) {
                    const newName = prompt('เปลี่ยนชื่อ Playlist', pl.name);
                    if(newName) pl.name = newName;
                    const newUrl = prompt('URL M3U ต้นทาง (ถ้าต้องการโหลดช่องใหม่, ปล่อยว่าง)', pl.urlSource||'');
                    if(newUrl !== null) {
                        if(newUrl.trim() === "") pl.urlSource = null;
                        else pl.urlSource = newUrl;
                        if(newUrl.trim()) {
                            fetch(newUrl).then(res=>res.text()).then(txt=>{ pl.channels = parseM3UToChannels(txt).channels; saveData(); renderPlaylistDropdown(); updateGroupSelect(); renderChannels(); refreshPlaylistListUI(); }).catch(()=>alert('โหลด URL ไม่สำเร็จ'));
                        } else { saveData(); renderPlaylistDropdown(); updateGroupSelect(); renderChannels(); refreshPlaylistListUI(); }
                    } else { saveData(); renderPlaylistDropdown(); updateGroupSelect(); renderChannels(); refreshPlaylistListUI(); }
                }
            };
        });
        document.querySelectorAll('.delete-pl').forEach(btn => {
            btn.onclick = () => {
                const id = parseInt(btn.dataset.id);
                if(playlists.length <= 1) return alert('ต้องมีอย่างน้อย 1 Playlist');
                if(confirm('ลบ Playlist นี้?')) {
                    const idx = playlists.findIndex(p=>p.id===id);
                    playlists.splice(idx,1);
                    if(currentPlaylistId === id) currentPlaylistId = playlists[0].id;
                    saveData();
                    renderPlaylistDropdown();
                    updateGroupSelect();
                    renderChannels();
                    refreshPlaylistListUI();
                }
            };
        });
    }

    // Parser M3U (including #KODIPROP)
    function parseM3UToChannels(content) {
        const lines = content.split(/\r?\n/);
        let channels = [], current = {};
        for(let line of lines) {
            line = line.trim();
            if(line.startsWith('#EXTINF')) {
                let g=line.match(/group-title="([^"]*)"/), l=line.match(/tvg-logo="([^"]*)"/), n=line.match(/,([^,]+)$/);
                current.name = n ? n[1].trim() : 'ไม่ระบุ'; current.logo = l ? l[1] : null; current.group = g ? g[1] : "Uncategorized";
            } else if(line.startsWith('#KODIPROP:')) {
                let prop = line.substring(10), eq = prop.indexOf('=');
                if(eq>0) {
                    let k=prop.substring(0,eq).trim(), v=prop.substring(eq+1).trim();
                    if(k === 'inputstream.adaptive.license_key') {
                        current.licenseKeyRaw = v;
                        let parts = v.split(':');
                        if(parts.length===2) { current.keyId=parts[0]; current.licenseKey=parts[1]; }
                        else current.licenseKey = v;
                    }
                }
            } else if(line.startsWith('http://') || line.startsWith('https://')) {
                current.url = line;
                if(current.name) { channels.push({ ...current, id: Date.now()+Math.random() }); current = {}; }
            }
        }
        return { channels };
    }

    // Channel Add/Edit Modals
    function openAddChannelModal() {
        let html = `<h3>📺 เพิ่มช่อง</h3><div class="form-group"><input id="chName" placeholder="ชื่อช่อง"></div><div class="form-group"><input id="chUrl" placeholder="URL (http://... .mpd/.m3u8)"></div><div class="form-group"><input id="chLogo" placeholder="Logo URL (ไม่บังคับ)"></div><div class="form-group"><input id="chGroup" placeholder="กลุ่ม เช่น News/Sport"></div><div class="form-group"><input id="chLicense" placeholder="license_key (keyid:key) สำหรับ Clearkey"></div><div class="flex-buttons"><button id="saveChannelBtn" class="btn-primary">บันทึก</button><button class="btn-outline-modal" onclick="closeModal()">ยกเลิก</button></div>`;
        openModalRaw(html);
        document.getElementById('saveChannelBtn').onclick = () => {
            const name = document.getElementById('chName').value.trim(), url = document.getElementById('chUrl').value.trim();
            if(!name || !url) return alert('จำเป็น');
            const licRaw = document.getElementById('chLicense').value.trim();
            let kid=null, lkey=null;
            if(licRaw) { let p=licRaw.split(':'); if(p.length===2) { kid=p[0]; lkey=p[1]; } else lkey=licRaw; }
            currentPlaylist().channels.push({ id: Date.now(), name, url, logo: document.getElementById('chLogo').value.trim()||null, group: document.getElementById('chGroup').value.trim()||"Uncategorized", keyId: kid, licenseKey: lkey, licenseKeyRaw: licRaw });
            saveData(); renderPlaylistDropdown(); updateGroupSelect(); renderChannels(); closeModal();
        };
    }
    function openEditChannelModal(idx) {
        const ch = currentPlaylist().channels[idx];
        if(!ch) return;
        let html = `<h3>✏️ แก้ไขช่อง</h3><div class="form-group"><input id="chName" value="${escapeHtml(ch.name)}"></div><div class="form-group"><input id="chUrl" value="${escapeHtml(ch.url)}"></div><div class="form-group"><input id="chLogo" value="${ch.logo||''}"></div><div class="form-group"><input id="chGroup" value="${ch.group||''}"></div><div class="form-group"><input id="chLicense" value="${ch.licenseKeyRaw||''}"></div><div class="flex-buttons"><button id="updateChannelBtn" class="btn-primary">อัปเดต</button><button class="btn-outline-modal" onclick="closeModal()">ยกเลิก</button></div>`;
        openModalRaw(html);
        document.getElementById('updateChannelBtn').onclick = () => {
            ch.name = document.getElementById('chName').value.trim(); ch.url = document.getElementById('chUrl').value.trim();
            if(!ch.name || !ch.url) return alert('ข้อมูลไม่ถูกต้อง');
            ch.logo = document.getElementById('chLogo').value.trim()||null; ch.group = document.getElementById('chGroup').value.trim()||"Uncategorized";
            const licRaw = document.getElementById('chLicense').value.trim();
            let kid=null,lkey=null;
            if(licRaw) { let p=licRaw.split(':'); if(p.length===2) { kid=p[0]; lkey=p[1]; } else lkey=licRaw; }
            ch.licenseKeyRaw = licRaw; ch.keyId = kid; ch.licenseKey = lkey;
            saveData(); renderPlaylistDropdown(); updateGroupSelect(); renderChannels(); closeModal();
        };
    }

    // Modal utils
    function openModalRaw(contentHtml) {
        const modal = document.getElementById('globalModal');
        document.getElementById('modalContent').innerHTML = contentHtml;
        modal.style.display = 'flex';
    }
    window.closeModal = function() {
        document.getElementById('globalModal').style.display = 'none';
    };

    // ---------- Event binding ----------
    document.getElementById('playlistDropdown').addEventListener('change', (e) => {
        currentPlaylistId = parseInt(e.target.value);
        currentGroupFilter = "ทั้งหมด";
        saveData();
        renderPlaylistDropdown();
        updateGroupSelect();
        renderChannels();
    });
    document.getElementById('openPlaylistManagerBtn').onclick = openPlaylistManager;
    document.getElementById('searchInput').addEventListener('input', (e) => { searchKeyword = e.target.value; renderChannels(); });
    document.getElementById('groupSelect').addEventListener('change', (e) => { currentGroupFilter = e.target.value; renderChannels(); });
    document.getElementById('qualityBtn').onclick = () => showTrackSelector('quality');
    document.getElementById('audioBtn').onclick = () => showTrackSelector('audio');
    document.getElementById('subtitleBtn').onclick = () => showTrackSelector('subtitle');

    // initialize
    loadData();
    renderPlaylistDropdown();
    updateGroupSelect();
    renderChannels();
    initShaka();
</script>
