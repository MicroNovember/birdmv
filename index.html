<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SAMORN Flix</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-black to-gray-900 text-white antialiased">
    <!-- Netflix Header with Tailwind enhancements -->
    <header class="netflix-header fixed top-0 w-full z-50 backdrop-blur-md bg-black/80 border-b border-gray-800/50 shadow-lg shadow-black/20">
        <div class="netflix-logo flex items-center gap-1">
            <span class="logo-text bg-gradient-to-r from-red-500 to-pink-500 bg-clip-text text-transparent font-black tracking-tight">SAMORN</span><span class="logo-flix text-white font-bold">FLIX</span>
        </div>
 
        <div class="netflix-search relative group">
            <input type="text" id="searchInput" placeholder="ค้นหาหนัง..." autocomplete="off" 
                class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-full px-4 py-2 pl-10 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-pink-500/50 focus:border-pink-500/50 transition-all duration-300 w-48 focus:w-64">
            <span class="search-icon absolute left-3 top-1/2 -translate-y-1/2 text-white/60 group-focus-within:text-pink-400 transition-colors">🔍</span>
        </div>
    </header>

    <!-- Netflix Content with Tailwind -->
    <main class="netflix-content pt-24 pb-12 px-4 sm:px-6 lg:px-8 xl:px-12">
        <section class="netflix-section max-w-7xl mx-auto">
 
            <div id="moviesContainer" class="netflix-row grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-6">
                <div class="netflix-loading col-span-full flex items-center justify-center py-20 text-gray-400">
                    <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-pink-500 mr-3"></div>
                    กำลังโหลดหนัง...
                </div>
            </div>
        </section>
        
        <!-- Pagination -->
        <div id="paginationContainer" class="pagination mt-10 flex justify-center items-center gap-2"></div>
    </main>

    <!-- Netflix Footer with Tailwind -->
    <footer class="netflix-footer border-t border-gray-800/50 bg-black/50 backdrop-blur-sm mt-auto">
        <div class="footer-content max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center">
            <p class="text-gray-400 text-sm">© 2026 SAMORN Flix | By DISC Metal Group (Since 1992)</p>
            
   
            
            <div class="footer-copyright mt-4 pt-4 border-t border-gray-800/30">
                <p class="text-gray-500 text-xs">All rights reserved. Powered by DMTX</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
