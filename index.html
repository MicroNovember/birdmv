<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie & Series Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: {
                            purple: '#9333ea',
                            blue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-600 to-blue-500 bg-clip-text text-transparent">
                        MovieStream
                    </h1>
                    <nav class="hidden md:flex space-x-6">
                        <a href="#" class="hover:text-purple-400 transition-colors">หน้าแรก</a>
                        <a href="#" class="hover:text-purple-400 transition-colors">ซีรีส์</a>
                        <a href="#" class="hover:text-purple-400 transition-colors">หนัง</a>
                        <a href="#" class="hover:text-purple-400 transition-colors">รายการโปรด</a>
                    </nav>
                </div>
                <div class="flex items-center space-x-4">
                    <!-- Search -->
                    <div class="relative">
                        <input type="text" 
                               id="searchInput"
                               placeholder="ค้นหาซีรีส์หรือหนัง..." 
                               class="bg-gray-700 text-gray-100 px-4 py-2 pr-10 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 w-64">
                        <button class="absolute right-2 top-2 text-gray-400 hover:text-purple-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </button>
                    </div>
                    <!-- Theme Toggle -->
                    <button id="themeToggle" class="p-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Content Tabs -->
        <div class="mb-8">
            <div class="flex space-x-1 bg-gray-800 p-1 rounded-lg">
                <button id="moviesTab" class="tab-button px-6 py-2 rounded-md font-medium transition-all">
                    หนัง
                </button>
                <button id="seriesTab" class="tab-button px-6 py-2 rounded-md font-medium transition-all">
                    ซีรีส์
                </button>
                <button id="continueTab" class="tab-button px-6 py-2 rounded-md font-medium transition-all">
                    ดูต่อ
                </button>
                <button id="watchlistTab" class="tab-button px-6 py-2 rounded-md font-medium transition-all">
                    รายการโปรด
                </button>
            </div>
        </div>

        <!-- Movies Section -->
        <section id="moviesSection" class="content-section">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">หนังทั้งหมด</h2>
                <select class="bg-gray-700 text-gray-100 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <option>ล่าสุด</option>
                    <option>ยอดนิยม</option>
                    <option>คะแนนสูง</option>
                    <option>ปี</option>
                </select>
            </div>
            <div id="moviesGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Movies will be loaded here -->
            </div>
        </section>

        <!-- Series Section -->
        <section id="seriesSection" class="content-section hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">ซีรีส์ทั้งหมด</h2>
                <select class="bg-gray-700 text-gray-100 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <option>ล่าสุด</option>
                    <option>ยอดนิยม</option>
                    <option>คะแนนสูง</option>
                </select>
            </div>
            <div id="seriesGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Series will be loaded here -->
            </div>
        </section>

        <!-- Continue Watching Section -->
        <section id="continueSection" class="content-section hidden">
            <h2 class="text-xl font-semibold mb-6">ดูต่อ</h2>
            <div id="continueGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Continue watching items will be loaded here -->
            </div>
        </section>

        <!-- Watchlist Section -->
        <section id="watchlistSection" class="content-section hidden">
            <h2 class="text-xl font-semibold mb-6">รายการโปรด</h2>
            <div id="watchlistGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Watchlist items will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 border-t border-gray-700 mt-16">
        <div class="container mx-auto px-4 py-8">
            <div class="text-center text-gray-400">
                <p>&copy; 2024 MovieStream. Built with ❤️ using Tailwind CSS</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
