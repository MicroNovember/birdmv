<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Player</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 M3U Player</h1>
            <p class="subtitle">สตรีมวิดีโอจาก Playlist ของคุณ</p>
        </div>

        <div class="playlist-menu">
            <div class="playlist-selector">
                <label for="playlistSelect">📋 เลือก Playlist:</label>
                <select id="playlistSelect"></select>
            </div>
            <button id="addPlaylistBtn" class="add-playlist-btn">+ เพิ่ม Playlist</button>
        </div>

        <!-- Add Playlist Modal -->
        <div class="modal" id="addPlaylistModal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>เพิ่ม Playlist ใหม่</h2>
                    <button class="close-btn" id="closeModalBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="playlistName">ชื่อ Playlist:</label>
                        <input type="text" id="playlistName" placeholder="ตั้งชื่อ Playlist">
                    </div>
                    <div class="form-group">
                        <label for="playlistUrlInput">URL ของ Playlist:</label>
                        <input type="text" id="playlistUrlInput" placeholder="วาง URL ของ Playlist (.m3u)">
                    </div>
                    <div class="modal-actions">
                        <button id="savePlaylistBtn" class="save-btn">บันทึก</button>
                        <button id="cancelPlaylistBtn" class="cancel-btn">ยกเลิก</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-section">
            <div class="file-upload">
                <label for="m3uFile">📁 เลือกไฟล์ .m3u</label>
                <input type="file" id="m3uFile" accept=".m3u">
            </div>

            <div class="divider">หรือ</div>

            <div class="url-section">
                <div class="url-input-group">
                    <input type="text" id="playlistUrl" placeholder="วาง URL ของ Playlist ที่นี่...">
                    <button id="loadUrlBtn" class="load-btn">โหลด Playlist</button>
                </div>
                <p class="url-hint">รองรับ Google Drive URL และ URL ทั่วไป</p>
            </div>
        </div>

        <div class="loading-indicator" id="loadingIndicator" style="display: none;">
            <div class="spinner"></div>
            <p>กำลังโหลด Playlist...</p>
        </div>

        <div class="stats" id="stats"></div>

        <div class="video-grid" id="videoGrid"></div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script src="playlist.js"></script>
    <script src="app.js"></script>
</body>
</html>
