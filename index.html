<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SAMORN IPTV 2026 | Ultra-Fast Shaka Player</title>
    <link rel="preconnect" href="https://raw.githubusercontent.com">
    <link rel="preconnect" href="https://udn-streamer1.cdn.3bbtv.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.11.6/dist/shaka-player.compiled.js"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #fbbf24; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.5rem;
        }
        .channel-grid-item {
            background: rgba(30,41,59,0.5);
            border-radius: 0.75rem;
            border: 1px solid rgba(71,85,105,0.4);
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0.6rem 0.25rem;
        }
        .channel-grid-item:hover, .channel-list-item:hover { background: rgba(51,65,85,0.7); border-color: #f59e0b; transform: translateY(-2px); }
        .channel-grid-item.active, .channel-list-item.active { background: rgba(245,158,11,0.15); border-color: #f59e0b; }
        .channel-grid-logo { width: 44px; height: 44px; border-radius: 12px; background: #1e293b; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
        .channel-grid-name { font-size: 11px; font-weight: 500; color: #e2e8f0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .channels-list { display: flex; flex-direction: column; gap: 0.25rem; }
        .channel-list-item { padding: 0.5rem 0.75rem; border-radius: 0.75rem; background: rgba(30,41,59,0.3); border: 1px solid transparent; display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
        .channel-list-logo { width: 32px; height: 32px; border-radius: 8px; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
        .channel-list-name { font-size: 13px; font-weight: 500; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-view-toggle { background: #1e293b; border-radius: 40px; padding: 3px; display: flex; gap: 2px; }
        .btn-view-toggle button { padding: 4px 10px; border-radius: 40px; font-size: 11px; font-weight: 500; background: transparent; color: #94a3b8; }
        .btn-view-toggle button.active { background: #f59e0b; color: #0f172a; }
        @media (max-width: 768px) {
            .channels-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 0.4rem; }
            .channel-grid-logo { width: 38px; height: 38px; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 to-slate-900 text-slate-100 min-h-screen flex flex-col">

<header class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800/50">
    <div class="max-w-7xl mx-auto px-3 py-2 flex flex-wrap items-center justify-between gap-2">
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 bg-gradient-to-br from-amber-500 to-orange-600 rounded-lg flex items-center justify-center">📺</div>
            <h1 class="text-base md:text-lg font-bold bg-gradient-to-r from-amber-400 to-orange-400 bg-clip-text text-transparent">SAMORN IPTV <span class="text-white text-sm">2026</span></h1>
        </div>
        <div class="flex gap-2">
            <label class="bg-blue-600/80 hover:bg-blue-500 text-white font-semibold px-3 py-1.5 rounded-lg text-xs cursor-pointer">📂 M3U<input type="file" id="offlineFile" accept=".m3u,.txt" class="hidden"></label>
            <button id="openManagerBtn" class="bg-slate-800/70 hover:bg-slate-700 text-slate-200 px-3 py-1.5 rounded-lg text-xs">⚙️ คลัง</button>
        </div>
    </div>
</header>

<main class="max-w-7xl w-full mx-auto p-3 flex flex-col gap-4 flex-grow">
    <div class="bg-slate-900/30 backdrop-blur-sm rounded-xl border border-slate-800/40 p-2">
        <div class="flex items-center justify-between mb-1"><span class="text-[9px] font-bold text-amber-400/80">📡 แหล่งสัญญาณ</span><span id="activeSourceBadge" class="text-[9px] bg-slate-800 px-2 py-0.5 rounded-full">คลังออนไลน์</span></div>
        <div id="quickPlaylistBar" class="flex flex-nowrap overflow-x-auto gap-1.5 pb-1 hide-scrollbar"></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 items-start">
        <div class="lg:col-span-2 space-y-3">
            <div class="relative bg-black rounded-xl overflow-hidden shadow-xl border border-slate-800 aspect-video">
                <video id="videoPlayer" class="w-full h-full" controls autoplay playsinline style="display:none;"></video>
                <iframe id="iframePlayer" allowfullscreen allow="autoplay" class="w-full h-full border-none" style="display:none;"></iframe>
            </div>
            <div class="bg-slate-900/60 backdrop-blur rounded-xl border border-slate-800 p-3 flex items-center gap-3">
                <div id="logoWrapper" class="w-11 h-11 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700 overflow-hidden flex-shrink-0">
                    <span id="textLogo" class="font-bold text-sm text-slate-300 uppercase">📺</span>
                    <img id="imgLogo" class="hidden w-full h-full object-contain p-1" alt="Logo">
                </div>
                <div class="flex-grow min-w-0">
                    <h2 id="currentTrackTitle" class="text-sm md:text-base font-bold text-slate-100 truncate">ไม่มีช่องที่เลือก</h2>
                    <p id="channelMeta" class="text-[10px] text-slate-400 truncate">เลือกช่องจากรายการ</p>
                </div>
            </div>
        </div>
        <div class="bg-slate-900/60 backdrop-blur rounded-xl border border-slate-800 flex flex-col h-[60vh] min-h-[420px] overflow-hidden">
            <div class="p-2.5 border-b border-slate-800/80 flex flex-wrap justify-between items-center gap-2">
                <div><p id="currentLoadedPlaylistName" class="text-[8px] text-amber-400">— ไม่โหลด —</p><h3 class="font-semibold text-slate-200 text-xs">รายการช่อง <span id="channelCount" class="text-amber-400 text-[10px] bg-slate-800 px-1.5 py-0.5 rounded-full">0</span></h3></div>
                <div class="flex gap-2">
                    <div class="btn-view-toggle"><button id="viewListBtn" class="active">📋</button><button id="viewGridBtn">⊞</button></div>
                    <input type="text" id="searchBox" placeholder="ค้นหา" class="w-28 sm:w-32 bg-slate-800/80 border border-slate-700 rounded-lg px-2 py-1 text-xs text-white">
                </div>
            </div>
            <div id="playlistContainer" class="overflow-y-auto flex-grow p-1.5"></div>
        </div>
    </div>
</main>

<footer class="text-center text-[9px] text-slate-600 py-3 border-t border-slate-800/50 mt-3">SAMORN IPTV 2026 · Shaka Player + Clearkey DRM</footer>

<div id="playlistManagerModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-700 rounded-xl w-full max-w-lg max-h-[80vh] flex flex-col">
        <div class="p-3 border-b border-slate-800 flex justify-between"><h3 class="text-base font-bold text-amber-400">📝 จัดการคลัง Playlist</h3><button id="closeModalBtn" class="text-slate-400 hover:text-white text-xl">&times;</button></div>
        <div class="p-3 bg-slate-950/30 border-b border-slate-800 space-y-3">
            <input type="hidden" id="editIndex" value="-1">
            <input type="text" id="plName" placeholder="ชื่อ Playlist" class="w-full bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-lg text-white text-sm">
            <input type="text" id="plUrl" placeholder="ลิงก์ URL .m3u" class="w-full bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-lg text-white text-sm font-mono">
            <div class="flex justify-end gap-2">
                <button id="cancelEditBtn" class="hidden bg-slate-800 px-3 py-1 rounded-lg text-xs">ยกเลิก</button>
                <button id="savePlaylistBtn" class="bg-amber-600 hover:bg-amber-500 text-slate-950 font-bold px-4 py-1.5 rounded-lg text-xs">➕ บันทึก</button>
            </div>
        </div>
        <div id="modalPlaylistList" class="p-2 overflow-y-auto flex-grow space-y-1.5"></div>
    </div>
</div>

<script>
    // ==================== ตัวแปรหลัก ====================
    const DEFAULT_PLAYLISTS = [
        { name: "iPTVplus ลิขสิทธิ์สด", url: "https://raw.githubusercontent.com/ตัวอย่าง/main/iptv.m3u" },
        { name: "สำรองช่องสตรีม 3BB", url: "https://raw.githubusercontent.com/ตัวอย่าง/main/3bb-backup.m3u" }
    ];
    let playlists = [];
    let allChannels = [];
    let pcFileCache = null;
    let currentMode = 'online';
    let activePlaylistIdx = 0;
    let currentView = 'list';
    let shakaPlayer = null;
    let currentAbortController = null;
    let playlistCache = new Map(); // cache M3U text

    const videoPlayer = document.getElementById("videoPlayer");
    const iframePlayer = document.getElementById("iframePlayer");

    // ---------- Helper ----------
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    // ---------- LocalStorage ----------
    function savePlaylistsToLocal() { localStorage.setItem('samorn_iptv_playlists', JSON.stringify(playlists)); }
    function loadPlaylistsFromLocal() {
        const saved = localStorage.getItem('samorn_iptv_playlists');
        if(saved) playlists = JSON.parse(saved);
        else playlists = [...DEFAULT_PLAYLISTS];
        savePlaylistsToLocal();
    }

    // ---------- เล่นวิดีโอ (ยกมาจากโค้ดแรกและปรับปรุงร่วมกับแอปเดิม) ----------
    async function playChannel(channel) {
        if (!videoPlayer || !iframePlayer) return;

        // เช็คประเภท URL (ถ้าเป็น php, embed, youtube จะเปิดเป็น iframe)
        const isIframe = channel.url.includes(".php") || channel.url.includes("embed") || channel.url.includes("youtube");

        // รีเซ็ตการแสดงผลผู้เล่นทั้งสองอันก่อน
        videoPlayer.style.display = "none";
        iframePlayer.style.display = "none";
        iframePlayer.src = "";

        // ทำลาย (destroy) Shaka player ตัวเก่าทิ้งก่อน (ดึงมาจากระบบโครงสร้างโค้ดแรก)
        if (shakaPlayer) {
            await shakaPlayer.destroy();
            shakaPlayer = null;
        }

        // อัปเดตข้อมูล UI หัวข้อช่องด้านล่างเครื่องเล่น
        document.getElementById('currentTrackTitle').innerText = channel.name;
        
        // อัปเดตโลโก้ (ถ้ามี)
        const imgLogo = document.getElementById('imgLogo');
        const textLogo = document.getElementById('textLogo');
        if(channel.logo) {
            imgLogo.src = channel.logo;
            imgLogo.classList.remove('hidden');
            textLogo.classList.add('hidden');
        } else {
            imgLogo.classList.add('hidden');
            textLogo.classList.remove('hidden');
        }

        // ================= รูปแบบ 1: เล่นด้วย IFRAME =================
        if (isIframe) {
            iframePlayer.style.display = "block";
            iframePlayer.src = channel.url;
            document.getElementById('channelMeta').innerText = 'เว็บภายนอก (iFrame)';
        } 
        // ================= รูปแบบ 2: เล่นด้วย VIDEO (SHAKA PLAYER) =================
        else {
            videoPlayer.style.display = "block";
            
            // สร้างอินสแตนซ์ของ Shaka Player ขึ้นมาใหม่
            shakaPlayer = new shaka.Player(videoPlayer);

            // ดักจับ Error log แบบโค้ดแรก
            shakaPlayer.addEventListener('error', e => {
                console.error('Shaka Error', e.detail);
            });

            const isMpd = channel.url.toLowerCase().includes('.mpd');
            document.getElementById('channelMeta').innerText = (isMpd ? 'DASH' : 'HLS') + (channel.drm ? ' 🔐 DRM' : '');

            // ตั้งค่าระบบลิขสิทธิ์ DRM (ClearKeys) หากระบุมาในสตรีม
            if (channel.drm && channel.keyId && channel.key) {
                // ตัวอย่างรูปแบบ ClearKey ของ Shaka คือ { "keyId": "key" }
                shakaPlayer.configure({
                    drm: {
                        clearKeys: {
                            [channel.keyId]: channel.key
                        }
                    }
                });
            }

            try {
                // โหลดและสั่งเล่นวิดีโอ
                await shakaPlayer.load(channel.url);
                await videoPlayer.play();
                console.log("กำลังเล่น:", channel.name);
            } catch(err) {
                console.error("เล่นไม่ได้", err);
                document.getElementById('channelMeta').innerText = '❌ เล่นไม่ได้';
            }
        }
    }

    // ---------- M3U Parser (รองรับ #KODIPROP) ----------
    function parseM3U(content, sourceName) {
        const lines = content.split(/\r?\n/);
        const channels = [];
        let current = { name: '', logo: '', keyId: '', key: '', drm: false };
        for(let line of lines) {
            line = line.trim();
            if(line.startsWith('#EXTINF')) {
                const logoMatch = line.match(/tvg-logo=["']([^"']+)["']/i);
                const nameMatch = line.match(/,([^,]+)$/);
                current.logo = logoMatch ? logoMatch[1] : '';
                current.name = nameMatch ? nameMatch[1].trim() : 'ไม่ระบุชื่อ';
            } else if(line.includes('#KODIPROP:inputstream.adaptive.license_key=')) {
                const keyData = line.replace('#KODIPROP:inputstream.adaptive.license_key=', '').trim();
                if(keyData.includes(':')) {
                    const parts = keyData.split(':');
                    current.keyId = parts[0];
                    current.key = parts[1];
                    current.drm = true;
                } else { current.key = keyData; current.drm = true; }
            } else if(line.startsWith('http://') || line.startsWith('https://')) {
                channels.push({
                    name: current.name,
                    logo: current.logo,
                    url: line,
                    keyId: current.keyId,
                    key: current.key,
                    drm: current.drm
                });
                current = { name: '', logo: '', keyId: '', key: '', drm: false };
            }
        }
        allChannels = channels;
        document.getElementById('channelCount').innerText = allChannels.length;
        renderChannels(allChannels);
        if(allChannels.length > 0) playChannel(allChannels[0]);
        document.getElementById('currentLoadedPlaylistName').innerText = sourceName || 'Playlist';
    }

    // ---------- Fetch M3U พร้อม Cache และ Abort ----------
    async function fetchM3U(url, name, idx) {
        if(currentAbortController) currentAbortController.abort();
        currentAbortController = new AbortController();
        const signal = currentAbortController.signal;
        document.getElementById('playlistContainer').innerHTML = '<div class="text-center text-amber-400 text-xs p-4">⏳ กำลังโหลด...</div>';
        try {
            if(playlistCache.has(url)) {
                parseM3U(playlistCache.get(url), name);
                return;
            }
            const response = await fetch(url, { signal });
            if(!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            playlistCache.set(url, text);
            parseM3U(text, name);
        } catch(e) {
            if(e.name !== 'AbortError') document.getElementById('playlistContainer').innerHTML = `<div class="text-red-400 text-xs p-4">❌ โหลดผิด: ${e.message}</div>`;
        }
        currentMode = 'online';
        activePlaylistIdx = idx;
        renderQuickBar();
    }

    // ---------- Offline File ----------
    function loadOfflineFile(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            pcFileCache = { name: file.name, content: e.target.result };
            currentMode = 'offline';
            parseM3U(pcFileCache.content, `📁 ${pcFileCache.name}`);
            renderQuickBar();
        };
        reader.readAsText(file);
    }
    function activateOfflineFile() {
        if(pcFileCache) parseM3U(pcFileCache.content, `📁 ${pcFileCache.name}`);
        renderQuickBar();
    }

    // ---------- Render UI (Grid/List) ----------
    function renderChannels(channels) {
        const container = document.getElementById('playlistContainer');
        if(!channels.length) { container.innerHTML = '<div class="text-center text-slate-500 text-xs p-8">ไม่มีช่อง</div>'; return; }
        if(currentView === 'grid') {
            const grid = document.createElement('div'); grid.className = 'channels-grid';
            channels.forEach((ch, idx) => {
                const div = document.createElement('div'); div.className = 'channel-grid-item';
                div.innerHTML = `<div class="channel-grid-logo">${ch.logo ? `<img src="${ch.logo}" class="w-full h-full object-contain p-1" onerror="this.style.display='none'">` : `<span class="text-xs font-mono">${String(idx+1).slice(-2)}</span>`}</div>
                                <div class="channel-grid-name">${escapeHtml(ch.name)}</div>${ch.drm ? '<span class="text-[7px] bg-amber-500/20 text-amber-400 px-1 rounded-full mt-0.5">DRM</span>' : ''}`;
                div.onclick = () => { playChannel(ch); document.querySelectorAll('.channel-grid-item,.channel-list-item').forEach(el => el.classList.remove('active')); div.classList.add('active'); };
                grid.appendChild(div);
            });
            container.innerHTML = ''; container.appendChild(grid);
        } else {
            const list = document.createElement('div'); list.className = 'channels-list';
            channels.forEach((ch, idx) => {
                const div = document.createElement('div'); div.className = 'channel-list-item';
                div.innerHTML = `<div class="channel-list-logo">${ch.logo ? `<img src="${ch.logo}" class="w-full h-full object-contain p-0.5" onerror="this.style.display='none'">` : `<span class="text-[10px] font-mono">${String(idx+1).slice(-2)}</span>`}</div>
                                <div class="channel-list-name">${escapeHtml(ch.name)}</div>${ch.drm ? '<span class="text-[8px] bg-amber-500/20 text-amber-400 px-1 rounded-full">DRM</span>' : ''}`;
                div.onclick = () => { playChannel(ch); document.querySelectorAll('.channel-list-item,.channel-grid-item').forEach(el => el.classList.remove('active')); div.classList.add('active'); };
                list.appendChild(div);
            });
            container.innerHTML = ''; container.appendChild(list);
        }
    }

    function filterChannels() { const kw = document.getElementById('searchBox').value.toLowerCase(); renderChannels(allChannels.filter(c => c.name.toLowerCase().includes(kw))); }

    function setView(view) { currentView = view; document.getElementById('viewListBtn').classList.toggle('active', view==='list'); document.getElementById('viewGridBtn').classList.toggle('active', view==='grid'); filterChannels(); }

    // ---------- Playlist Manager UI ----------
    function renderModalList() {
        const container = document.getElementById('modalPlaylistList');
        container.innerHTML = playlists.map((pl, idx) => `
            <div class="bg-slate-950 border border-slate-800 p-2 rounded-lg flex justify-between items-center">
                <div class="min-w-0"><p class="font-bold text-amber-500 truncate text-xs">${escapeHtml(pl.name)}</p><p class="text-[9px] text-slate-500 truncate font-mono">${escapeHtml(pl.url)}</p></div>
                <div class="flex gap-1"><button data-edit="${idx}" class="edit-pl text-[9px] bg-slate-800 px-2 py-1 rounded-md text-blue-400">แก้ไข</button><button data-del="${idx}" class="del-pl text-[9px] bg-slate-800 px-2 py-1 rounded-md text-red-400">ลบ</button></div>
            </div>
        `).join('');
        document.querySelectorAll('.edit-pl').forEach(btn => btn.onclick = () => editPlaylist(parseInt(btn.dataset.edit)));
        document.querySelectorAll('.del-pl').forEach(btn => btn.onclick = () => deletePlaylist(parseInt(btn.dataset.del)));
    }
    function savePlaylist() {
        const name = document.getElementById('plName').value.trim(), url = document.getElementById('plUrl').value.trim(), editIdx = parseInt(document.getElementById('editIndex').value);
        if(!name || !url) return alert('กรุณากรอกให้ครบ');
        if(editIdx === -1) playlists.push({ name, url });
        else playlists[editIdx] = { name, url };
        savePlaylistsToLocal();
        initPlaylists();
        resetForm();
        toggleManager(false);
    }
    function editPlaylist(idx) {
        document.getElementById('editIndex').value = idx;
        document.getElementById('plName').value = playlists[idx].name;
        document.getElementById('plUrl').value = playlists[idx].url;
        document.getElementById('savePlaylistBtn').innerHTML = '💾 อัปเดต';
        document.getElementById('cancelEditBtn').classList.remove('hidden');
    }
    function deletePlaylist(idx) { if(confirm(`ลบ ${playlists[idx].name}?`)) { playlists.splice(idx,1); savePlaylistsToLocal(); initPlaylists(); resetForm(); } }
    function resetForm() { document.getElementById('editIndex').value = '-1'; document.getElementById('plName').value = ''; document.getElementById('plUrl').value = ''; document.getElementById('savePlaylistBtn').innerHTML = '➕ บันทึก'; document.getElementById('cancelEditBtn').classList.add('hidden'); }
    function toggleManager(forceClose) { const modal = document.getElementById('playlistManagerModal'); if(forceClose === false) modal.classList.add('hidden'); else modal.classList.toggle('hidden'); if(!modal.classList.contains('hidden')) renderModalList(); }

    // ---------- Render Quick Bar ----------
    function renderQuickBar() {
        const bar = document.getElementById('quickPlaylistBar');
        bar.innerHTML = playlists.map((pl, idx) => `<button id="pl-btn-${idx}" class="px-2 py-1.5 bg-slate-800/70 hover:bg-slate-700 text-slate-300 font-medium rounded-lg border border-slate-700 text-[11px] whitespace-nowrap cursor-pointer">${escapeHtml(pl.name)}</button>`).join('');
        if(pcFileCache) bar.innerHTML += `<span class="text-slate-600 mx-1">|</span><button id="pc-file-btn" class="px-2 py-1.5 bg-slate-800/70 text-blue-400 rounded-lg border border-slate-700 text-[11px]">💻 ${pcFileCache.name}</button>`;
        playlists.forEach((_, idx) => document.getElementById(`pl-btn-${idx}`)?.addEventListener('click', () => { currentMode='online'; activePlaylistIdx=idx; fetchM3U(playlists[idx].url, playlists[idx].name, idx); }));
        if(pcFileCache) document.getElementById('pc-file-btn')?.addEventListener('click', () => { currentMode='offline'; activateOfflineFile(); });
        if(currentMode==='online') document.getElementById(`pl-btn-${activePlaylistIdx}`)?.classList.add('bg-amber-600','text-slate-950');
        else if(pcFileCache) document.getElementById('pc-file-btn')?.classList.add('bg-blue-600','text-white');
        document.getElementById('activeSourceBadge').innerText = (currentMode==='online') ? 'คลังออนไลน์' : 'ไฟล์ในเครื่อง';
    }

    function initPlaylists() {
        loadPlaylistsFromLocal();
        renderQuickBar();
        renderModalList();
        if(playlists.length && !pcFileCache) fetchM3U(playlists[0].url, playlists[0].name, 0);
    }

    // ---------- Event Binding ----------
    document.getElementById('offlineFile').addEventListener('change', loadOfflineFile);
    document.getElementById('openManagerBtn').addEventListener('click', () => toggleManager());
    document.getElementById('closeModalBtn').addEventListener('click', () => toggleManager(false));
    document.getElementById('savePlaylistBtn').addEventListener('click', savePlaylist);
    document.getElementById('cancelEditBtn').addEventListener('click', resetForm);
    document.getElementById('searchBox').addEventListener('input', filterChannels);
    document.getElementById('viewListBtn').addEventListener('click', () => setView('list'));
    document.getElementById('viewGridBtn').addEventListener('click', () => setView('grid'));
    document.getElementById('playlistManagerModal').addEventListener('click', (e) => { if(e.target === document.getElementById('playlistManagerModal')) toggleManager(false); });

    initPlaylists();
</script>
</body>
</html>
