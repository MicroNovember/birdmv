<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SAMORN Flix - Video Player</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <!-- HLS.js for Plyr -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Plyr JS -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="netflix-video-page min-h-screen bg-gradient-to-br from-gray-900 via-black to-gray-900 text-white antialiased">
    <!-- Netflix Video Header with Tailwind -->
    <header class="netflix-video-header fixed top-0 w-full z-50 backdrop-blur-md bg-black/80 border-b border-gray-800/50 shadow-lg shadow-black/20 flex items-center justify-between px-4 sm:px-6 lg:px-8">
        <button class="netflix-back-btn flex items-center gap-2 bg-white/10 hover:bg-white/20 backdrop-blur-sm border border-white/20 rounded-full px-4 py-2 text-white transition-all duration-300 hover:scale-105" onclick="history.back()">
            <span class="text-lg">←</span>
            <span class="text-sm font-medium">กลับ</span>
        </button>
        <div class="netflix-logo-small flex items-center gap-1">
            <span class="bg-gradient-to-r from-red-500 to-pink-500 bg-clip-text text-transparent font-black tracking-tight">SAMORN</span><span class="logo-flix text-white font-bold">FLIX</span>
        </div>
        <div class="netflix-header-spacer w-20"></div>
    </header>

    <!-- Netflix Video Player with Tailwind -->
    <main class="netflix-video-main pt-20 pb-8 px-4 sm:px-6 lg:px-8 min-h-screen flex flex-col">
        <div class="netflix-video-wrapper max-w-5xl mx-auto w-full flex flex-col gap-6">
            <!-- Video Element -->
            <div class="relative rounded-xl overflow-hidden shadow-2xl shadow-black/40 ring-1 ring-white/10">
                <video id="my-video" class="plyr__video-player netflix-video w-full" preload="auto" playsinline webkit-playsinline x5-playsinline x5-video-player-type="h5" x5-video-player-fullscreen="false">
                    <p class="vjs-no-js text-center py-8 text-gray-400">Your browser does not support the video tag.</p>
                </video>
            </div>
            
            <!-- Netflix Play Button Overlay -->
            <div class="netflix-play-overlay hidden" id="playOverlay">
                <!-- Play button removed -->
            </div>
            
            <!-- Video Info Below Player with Tailwind -->
            <div class="netflix-video-info bg-white/5 backdrop-blur-sm rounded-xl border border-white/10 p-4 sm:p-6">
                <div class="netflix-video-header-info flex flex-col sm:flex-row gap-4 sm:gap-6 items-center sm:items-start">
                    <div class="netflix-video-poster flex-shrink-0">
                        <img id="videoPoster" src="" alt="Movie Poster" class="w-32 sm:w-40 rounded-lg shadow-lg shadow-black/30 ring-1 ring-white/10 object-cover aspect-[3/2]">
                    </div>
                    <div class="netflix-video-details flex-1 text-center sm:text-left">
                        <h1 id="movieTitle" class="netflix-video-title text-xl sm:text-2xl lg:text-3xl font-bold mb-2 sm:mb-3 bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">กำลังโหลด...</h1>
                        <p id="movieDescription" class="netflix-video-desc text-sm sm:text-base text-gray-400 leading-relaxed">กำลังโหลดคำอธิบาย...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
// Get movie data from localStorage, URL parameter, or JSON API
const urlParams = new URLSearchParams(window.location.search);
const movieId = urlParams.get('movieId');

// Try to get movie data from localStorage first
let movieData = null;
const storedMovie = localStorage.getItem('samorn_current_movie');

if (storedMovie) {
    try {
        const movie = JSON.parse(storedMovie);
        if (movie.movieId === movieId || movie.id === movieId || movie._id === movieId) {
            movieData = movie;
        }
    } catch (e) {
        console.error('Error parsing stored movie data:', e);
    }
}

// If not found in localStorage, fetch from JSON API
if (!movieData) {
    console.log('Movie not found in localStorage, fetching from JSON API...');
    fetchFromJSONAPI(movieId);
}

// Fetch movie from protected JSON API with security
async function fetchFromJSONAPI(movieId) {
    try {
        // Security: Check if this is a legitimate request
        const userAgent = navigator.userAgent;
        const referer = document.referrer;
        
        // Block suspicious user agents
        const blockedAgents = ['curl', 'wget', 'python', 'java', 'scrapy', 'bot', 'crawler', 'postman', 'insomnia'];
        const isBlockedAgent = blockedAgents.some(agent => 
            userAgent.toLowerCase().includes(agent)
        );
        
        // Check referer
        const isAllowedReferer = !referer || 
            referer.includes('samorn-flix.vercel.app') || 
            referer.includes('localhost') ||
            referer.includes('127.0.0.1');
        
        if (isBlockedAgent || !isAllowedReferer) {
            console.error('🚨 Suspicious request blocked:', {
                userAgent: userAgent.substring(0, 100),
                referer: referer.substring(0, 100)
            });
            
            showError('การเข้าถึงถูกปฏิเสธ');
            return;
        }
        
        console.log('🔒 Security check passed, fetching from protected JSON API...');
        
        // First, try to load all movies from protected JSON
        const response = await fetch('/movies.json');
        if (!response.ok) {
            throw new Error('Failed to load movies.json');
        }
        
        const data = await response.json();
        
        // Check if data is protected
        let allMovies = [];
        if (data._protected) {
            console.log('🔒 Protected JSON data received');
            allMovies = data.movies || [];
        } else {
            console.log('📦 Regular JSON data received');
            allMovies = data.movies || [];
        }
        
        // Find the movie by ID
        const movie = allMovies.find(m => 
            m.movieId === movieId || 
            m.id === movieId || 
            m._id === movieId
        );
        
        if (movie) {
            movieData = movie;
            console.log('✅ Found movie in protected JSON:', movie.title);
            
            // Store in localStorage for future use
            localStorage.setItem('samorn_current_movie', JSON.stringify(movie));
            
            // Initialize video player
            initializeVideo();
        } else {
            console.error('❌ Movie not found in protected JSON:', movieId);
            showError('ไม่พบหนังที่ต้องการ');
        }
        
    } catch (error) {
        console.error('❌ Error fetching from protected JSON API:', error);
        showError('โหลดข้อมูลล้มเหลว: ' + error.message);
    }
}

// Show error message
function showError(message) {
    document.getElementById('movieTitle').textContent = 'ข้อผิดพลาด';
    document.getElementById('movieDescription').textContent = message;
    document.getElementById('videoPoster').src = 'https://placehold.co/160x90/141414/e50914?text=Error';
}

// Helper functions
function formatDuration(seconds) {
    if (!seconds || seconds <= 0) return "N/A";
    const hrs = Math.floor(seconds / 3600);
    const mins = Math.floor((seconds % 3600) / 60);
    const secs = seconds % 60;
    if (hrs > 0) {
        return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        if (m === "'") return '&#39;';
        return m;
    });
}

// Initialize video with movie data
function initializeVideo() {
    if (!movieData) return;
    
    console.log('🎬 Initializing video with data:', movieData);
    
    // Update video information
    const videoTitle = document.getElementById('movieTitle');
    const videoDescription = document.getElementById('movieDescription');
    const videoPoster = document.getElementById('videoPoster');
    
    if (videoTitle) {
        videoTitle.textContent = movieData.title || movieData.name || 'Unknown Title';
    }
    
    if (videoDescription) {
        videoDescription.textContent = movieData.description || 'ไม่มีคำอธิบาย';
    }
    
    if (videoPoster) {
        // Get poster URL - try multiple fields and convert to CloudFront
        let posterUrl = movieData.preview || 
                       movieData.poster || 
                       movieData.image || 
                       movieData.thumbnail || 
                       'https://placehold.co/300x450/141414/e50914?text=No+Poster';
        
        // Convert S3 to CloudFront for better performance
        if (posterUrl.includes('s3.ap-southeast-1.amazonaws.com')) {
            posterUrl = posterUrl.replace(
                'https://av24flix.s3.ap-southeast-1.amazonaws.com',
                'https://d1mx0ftvclwh0x.cloudfront.net'
            );
            console.log('🖼️ Converted poster to CloudFront URL:', posterUrl);
        }
        
        videoPoster.src = posterUrl;
        videoPoster.alt = movieData.title || movieData.name || 'Movie Poster';
        videoPoster.onerror = function() {
            this.src = 'https://placehold.co/300x450/141414/e50914?text=No+Poster';
        };
    }
    
    // Setup video player if video path is available
    if (movieData.path) {
        const videoElement = document.getElementById('my-video');
        if (videoElement) {
            try {
                // Initialize Plyr
                currentPlayer = new Plyr(videoElement, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
                    settings: ['captions', 'quality', 'speed'],
                    autoplay: false,
                    preload: 'auto',
                    tooltips: { controls: true, seek: true },
                    captions: { active: false, update: false, language: 'th' },
                    quality: { default: 'auto', options: ['auto'] },
                    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
                    loop: { active: false },
                    clickToPlay: true,
                    hideControls: false,
                    resetOnEnd: false,
                    keyboard: { focused: true, global: true },
                    seekTime: 10,
                    volume: 1,
                    muted: false,
                    disableContextMenu: false,
                    storage: { enabled: true, key: 'plyr' }
                });
                
                // Add event listeners for play/pause - Removed
                /* videoElement.addEventListener('play', hidePlayOverlay);
                videoElement.addEventListener('pause', showPlayOverlay);
                videoElement.addEventListener('ended', showPlayOverlay); */
                
                // Check if HLS.js is supported and needed
                if (Hls.isSupported()) {
                    const hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                        backBufferLength: 90,
                        maxBufferLength: 30,
                        maxMaxBufferLength: 600,
                        debug: false
                    });
                    
                    hls.loadSource(movieData.path);
                    hls.attachMedia(videoElement);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        console.log('HLS manifest parsed');
                    });
                    
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        console.error('HLS error:', data);
                        if (data.fatal) {
                            switch(data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    console.error('Fatal network error, trying to recover...');
                                    hls.startLoad();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    console.error('Fatal media error, trying to recover...');
                                    hls.recoverMediaError();
                                    break;
                                default:
                                    console.error('Fatal error, cannot recover');
                                    break;
                            }
                        }
                    });
                } else {
                    // Native HLS support or fallback
                    videoElement.src = movieData.path;
                }
                
                // Show play overlay initially - Removed
                /* showPlayOverlay(); */
                
            } catch (error) {
                console.error('Error initializing video player:', error);
            }
        }
        document.getElementById('movieDescription').textContent = `ไม่สามารถเริ่มเล่นวิดีโอได้: ${error.message}`;
    }
}

// Hide play button when video starts playing - Removed
/* function hidePlayOverlay() removed - no longer needed */

// Show play button when video pauses - Removed
/* function showPlayOverlay() removed - no longer needed */

// Initialize when page loads
document.addEventListener('DOMContentLoaded', function() {
    if (movieData) {
        initializeVideo();
    }
    // If no movieData, fetchFromJSONAPI will handle it
});

// Event listeners
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        history.back();
    }
});

// Cleanup on unload
window.addEventListener('beforeunload', function() {
    if (currentPlayer) {
        try {
            currentPlayer.destroy();
        } catch (error) {
            console.error('Error destroying player:', error);
        }
    }
});
</script>
</body>
</html>
