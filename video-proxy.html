<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Video Proxy</title>
    <style>
        body { margin: 0; padding: 0; background: #000; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <script>
        // Get video URL from query parameter
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');
        const subtitleUrl = urlParams.get('subtitle');
        
        if (videoUrl) {
            // Create video element
            const video = document.createElement('video');
            video.controls = true;
            video.autoplay = true;
            video.style.width = '100%';
            video.style.height = '100vh';
            
            // Add video source through local proxy
            const source = document.createElement('source');
            source.src = `/proxy-video/${encodeURIComponent(videoUrl)}`;
            source.type = 'video/mp4';
            video.appendChild(source);
            
            // Add subtitle if provided
            if (subtitleUrl) {
                console.log('Loading subtitle:', subtitleUrl);
                const track = document.createElement('track');
                track.label = 'Thai';
                track.kind = 'subtitles';
                track.srclang = 'th';
                track.src = `/proxy-subtitle/${encodeURIComponent(subtitleUrl)}`;
                track.default = true;
                video.appendChild(track);
                
                // Add subtitle error handling
                track.addEventListener('error', function(e) {
                    console.error('Subtitle error:', e);
                });
                
                track.addEventListener('load', function() {
                    console.log('Subtitle loaded successfully');
                });
            }
            
            // Add error handling
            video.addEventListener('error', function(e) {
                console.error('Video error:', e);
                document.body.innerHTML = '<div style="color: white; text-align: center; padding: 50px;">Video loading failed. Please try again.</div>';
            });
            
            video.addEventListener('loadstart', function() {
                console.log('Video loading started');
            });
            
            video.addEventListener('canplay', function() {
                console.log('Video can play');
                video.play().catch(error => {
                    console.error('Autoplay failed:', error);
                });
            });
            
            // Add text tracks listener for debugging
            video.addEventListener('loadedmetadata', function() {
                console.log('Video metadata loaded');
                const textTracks = video.textTracks;
                console.log('Text tracks:', textTracks.length);
                for (let i = 0; i < textTracks.length; i++) {
                    console.log('Track', i, textTracks[i].label, textTracks[i].language);
                }
            });
            
            document.body.appendChild(video);
        } else {
            document.body.innerHTML = '<div style="color: white; text-align: center; padding: 50px;">No video URL provided</div>';
        }
    </script>
</body>
</html>
