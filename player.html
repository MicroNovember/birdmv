<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .player-wrapper {
            width: 90%;
            max-width: 1200px;
            position: relative;
            /* เพิ่ม padding-top เพื่อเปิดพื้นที่ด้านบนให้หัวข้อและปุ่ม ไม่ให้เบียดกับขอบจอเกินไป */
            padding-top: 50px; 
        }

        .player-wrapper video {
            width: 100%;
            max-height: 80vh;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* เพิ่มมิติให้ตัววิดีโอ */
        }

        .close-player {
            position: absolute;
            top: 5px;                  /* ปรับตำแหน่งให้อยู่ในแนวเดียวกับหัวข้อ */
            right: 0;
            background: #e94560;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-player:hover {
            background: #ff6b6b;
        }

        /* ปรับปรุง CSS: แยกออกมาเป็นหัวข้อเด่นๆ ด้านบนวิดีโอ */
        .video-info-overlay {
            position: absolute;
            top: 5px;                    /* อยู่แนวระนาบเดียวกับปุ่มซ้าย-ขวา */
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-family: sans-serif;
            font-size: 18px;             /* เพิ่มขนาดให้เด่นชัดขึ้นในฐานะหัวข้อเรื่อง */
            font-weight: bold;           /* ทำเป็นตัวหนา */
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); /* เพิ่มเงาให้ตัวอักษรอ่านง่ายขึ้น */
            
            /* ป้องกันชื่อเรื่องยาวเกินไป */
            max-width: 60%;              /* จำกัดไม่ให้ชนปุ่มกลับ และปุ่มปิด */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .back-button {
            position: absolute;
            top: 5px;                  /* ปรับตำแหน่งให้อยู่ในแนวเดียวกับหัวข้อ */
            left: 0;
            background: #4ecca3;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .back-button:hover {
            background: #45b393;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-wrapper">
            <!-- ย้ายตำแหน่งกล่องข้อความมาไว้ด้านบนสุดของกรอบวิดีโอ -->
            <button class="back-button" onclick="goBack()">← กลับ</button>
            <div class="video-info-overlay" id="videoInfoOverlay"></div>
            <button class="close-player" onclick="closePlayer()">×</button>
            
            <video id="videoPlayer" controls></video>
        </div>
    </div>

    <script src="player.js"></script>
</body>
</html>
